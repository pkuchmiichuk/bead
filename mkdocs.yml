site_name: bead Documentation
site_description: Framework for large-scale linguistic judgment experiments
site_url: https://bead.readthedocs.io
repo_url: https://github.com/FACTSlab/bead
repo_name: FACTSlab/bead

theme:
  name: cinder
  highlightjs: false

extra_css:
  - css/pygments.css
  - css/custom.css

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      use_pygments: true
      guess_lang: false
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [bead]
          options:
            docstring_style: numpy
            docstring_section_style: table
            show_signature_annotations: true
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_object_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            heading_level: 2
            line_length: 75

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - User Guide:
    - Overview: user-guide/index.md
    - Core Concepts: user-guide/concepts.md
    - Configuration: user-guide/configuration.md
